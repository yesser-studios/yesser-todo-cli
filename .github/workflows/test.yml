name: Test

on:
  push:
    branches: ["master"]
    paths:
      - cli/**
      - api/**
      - db/**
      - server/**
      - .github/**
  pull_request:
    branches: ["master"]
    paths:
      - cli/**
      - api/**
      - db/**
      - server/**
      - .github/**
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          cargo build
          cargo run --bin yesser-todo-server &
          sleep 1000
          cargo test --verbose
          killall yesser-todo-server
