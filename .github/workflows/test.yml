name: Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        cd cli
        cargo test --verbose

  db:

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        cd db
        cargo test --verbose

  api:

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        cd server
        cargo run &
        cd ../api
        cargo test --verbose
        killall yesser-todo-server

  server:

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        cd server
        cargo test --verbose
