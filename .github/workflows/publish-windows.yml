name: Rust

on:
  release:
    types: published
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up a Rust toolchain
        uses: hecrj/setup-rust-action@v2.0.1

      - name: Build
        shell: bash
        run: |
          cd cli
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#*-v}"
          cargo build --verbose --release --config package.version="$VERSION"

      - name: Zip up
        run: 7z a windows-x64.zip .\cli\target\release\todo.exe

      - name: Add to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: windows-x64.zip
